<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoForecast</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f4f7fb 0%, #e8f1ff 100%);
      color: #1f2937;
    }
    .card {
      width: min(92vw, 520px);
      text-align: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      padding: 32px 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }
    p {
      margin: 0 0 22px;
      color: #6b7280;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      text-decoration: none;
      background: #0f766e;
      color: #fff;
      border-radius: 10px;
      padding: 12px 20px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    a:hover {
      background: #115e59;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CryptoForecast</h1>
    <p>Predict BTC-INR prices with a simple Flask + ML dashboard.</p>
    <a href="/dashboard">Go to Dashboard</a>
  </main>
</body>
</html>
